<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E.R.T.H | User</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="../js/app.js"></script>
</head>
<body data-page="employee">
  <div class="app-shell">
    <aside class="app-sidebar">
      <a class="brand" href="./employee.html">
        <span class="brand-mark">ERTH</span>
        <span class="brand-copy"><strong>User</strong></span>
      </a>
      <nav class="nav-list">
        <a class="nav-item active" href="/pages/employee.html">Current ride</a>
      </nav>
      <div class="sidebar-footer">
        <span id="sessionBadge" class="session-badge">Signed out</span>
        <button id="logoutButton" class="ghost-button" type="button">Sign out</button>
      </div>
    </aside>

    <main class="app-main">
      <header class="app-header">
        <div>
          <p class="eyebrow">Employee dashboard</p>
          <h1>Your cab schedule, live updates, and trip history</h1>
        </div>
        <div class="site-actions">
          <button id="refreshButton" class="primary-button" type="button">Refresh data</button>
          <button id="notificationBell" class="ghost-button notification-bell" type="button" aria-label="Notifications">
            <span class="bell-icon" aria-hidden="true"></span>
            <span class="notification-dot" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <section class="metrics-row">
        <article class="metric-card"><span>Assigned rides</span><strong id="metricAssigned">0</strong></article>
        <article class="metric-card"><span>Active ride</span><strong id="metricCurrentStatus">None</strong></article>
        <article class="metric-card"><span>Unread alerts</span><strong id="metricUnread">0</strong></article>
      </section>

      <section class="dashboard-grid">
        <section class="card span-2">
          <div class="section-heading"><div><p class="eyebrow">Live tracking</p><h3>Current cab map</h3></div></div>
          <div id="liveMap" class="map-surface"></div>
        </section>

        <section class="card">
          <div class="section-heading"><div><p class="eyebrow">Current ride</p><h3>Trip summary</h3></div></div>
          <div id="currentRideCard" class="list-panel"></div>
        </section>

        <section class="card span-2">
          <div class="section-heading"><div><p class="eyebrow">Ride history</p><h3>Assigned rides</h3></div></div>
          <div id="ridesTable" class="table-shell"></div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
