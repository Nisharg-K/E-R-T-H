<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E.R.T.H | Employee Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="../js/app.js"></script>
</head>
<body data-page="admin-map">
  <div class="app-shell">
    <aside class="app-sidebar">
      <a class="brand" href="./admin.html"><span class="brand-mark">ERTH</span><span class="brand-copy"><strong> Admin</strong></span></a>
      <nav class="nav-list">
        <a class="nav-item" href="./admin.html">Overview</a>
        <a class="nav-item" href="./admin-approval.html">Approval</a>
        <a class="nav-item" href="./admin-ride.html">Ride Groups</a>
        <a class="nav-item" href="./admin-people.html">People</a>
        <a class="nav-item active" href="./admin-map.html">Employee Map</a>
        <a class="nav-item" href="./admin-ai.html">AI Query</a>
      </nav>
      <div class="sidebar-footer">
        <span id="sessionBadge" class="session-badge">Signed out</span>
        <button id="logoutButton" class="ghost-button" type="button">Sign out</button>
      </div>
    </aside>
    <main class="app-main">
      <header class="app-header"><div><p class="eyebrow">Admin dashboard</p><h1>All Employee Locations</h1></div><span id="dashboardDate" style="font-size: 0.85rem; color: var(--muted);"></span></header>
      <section class="card span-3 map-full" style="height: calc(100vh - 180px); min-height: 550px; display: flex; flex-direction: column;">
        <div class="map-search-bar" style="margin: 16px 16px 12px 16px; display: flex; gap: 8px;">
          <input type="text" id="employeeSearchInput" placeholder="Search employee by name, ID, or email..." style="flex: 1; padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background-color: rgba(0,0,0,0.6); color: var(--text); font-family: inherit; font-size: 0.9rem;" />
          <button type="button" id="employeeSearchBtn" class="primary-button" style="padding: 10px 20px; width: auto;">Search</button>
        </div>
        <div id="allEmployeesMap" class="map-surface" style="flex: 1; min-height: 480px; border-radius: 10px; border: 1px solid var(--border);"></div>
      </section>
    </main>
  </div>
</body>
</html>
