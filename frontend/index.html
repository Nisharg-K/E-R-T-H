<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E.R.T.H | Employee Route Tracking Hub</title>
  <meta name="description" content="E.R.T.H - Employee Route Tracking Hub for cab routing, approvals, live trip visibility, and driver operations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/main.css" />
  <script defer src="./js/app.js"></script>
</head>
<body data-page="auth">
  <div class="page-shell auth-shell">
    <header class="site-header">
      <div class="logo-mark">H</div>
      <div class="header-info">
        <div class="day-display">Wednesday</div>
        <div class="date-display">Tenth of November</div>
      </div>
    </header>

    <main class="landing-hero landing-panel">
      <div class="landing-hero-inner">
        <h1 class="hero-title">E.R.T.H.</h1>
        <p class="hero-copy">
          Employee Routing and Tracking Hub for cab routing, approvals, live trip visibility, and driver operations.
        </p>
        
        <div class="auth-container">
          <!-- Auth Tabs -->
          <div class="auth-tabs">
            <button type="button" class="tab-button active" onclick="switchTab('login')">Sign In</button>
            <button type="button" class="tab-button" onclick="switchTab('signup')">Request Approval</button>
          </div>

          <!-- Sign In Panel -->
          <div id="loginPanel" class="auth-panel">
            <form id="loginForm" class="auth-form">
              <div class="form-group">
                <label for="loginEmail">Corporate Email</label>
                <input id="loginEmail" name="email" type="email" placeholder="name@aditiconsulting.com" required />
              </div>
              <div class="form-group">
                <label for="loginPassword">Password</label>
                <input id="loginPassword" name="password" type="password" placeholder="••••••••" required />
              </div>
              <button type="submit" class="primary-button full-width">Sign In</button>
              <div id="loginResult" class="form-result"></div>
            </form>
          </div>

          <!-- Sign Up / Request Approval Panel -->
          <div id="signupPanel" class="auth-panel" style="display: none;">
            <form id="signupForm" class="auth-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="signupName">Full Name</label>
                  <input id="signupName" name="full_name" type="text" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                  <label for="signupEmail">Email Address</label>
                  <input id="signupEmail" name="email" type="email" placeholder="name@aditiconsulting.com" required />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="signupPassword">Password</label>
                  <input id="signupPassword" name="password" type="password" placeholder="Min. 6 chars" required />
                </div>
                <div class="form-group">
                  <label for="signupMobile">Mobile Number</label>
                  <input id="signupMobile" name="mobile_number" type="tel" placeholder="+91 98765 43210" required />
                </div>
              </div>
              
              <div class="form-group">
                <label for="signupRole">Registering As</label>
                <select id="signupRole" name="role" onchange="toggleRoleFields()" required>
                  <option value="employee" selected>Employee (User)</option>
                  <option value="driver">Cab Driver</option>
                  <option value="admin">System Administrator</option>
                </select>
              </div>

              <!-- Employee Specific Fields -->
              <div id="employeeFields" class="form-row role-fields">
                <div class="form-group">
                  <label for="signupEmpId">Employee ID</label>
                  <input id="signupEmpId" name="employee_id" type="text" placeholder="EMP-1049" />
                </div>
                <div class="form-group">
                  <label for="signupDept">Department</label>
                  <input id="signupDept" name="department" type="text" placeholder="Engineering" />
                </div>
              </div>

              <!-- Driver Specific Fields -->
              <div id="driverFields" class="form-group role-fields" style="display: none;">
                <label for="signupLicense">Driving License Number</label>
                <input id="signupLicense" name="license_number" type="text" placeholder="DL-GJ0620240001" />
              </div>

              <button type="submit" class="primary-button full-width">Request Account Approval</button>
              <div id="signupResult" class="form-result"></div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    // Update date and day display
    function updateDateDisplay() {
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const today = new Date();
      
      const dayName = days[today.getDay()];
      const monthName = months[today.getMonth()];
      const date = today.getDate();
      
      // Format date as ordinal
      const getOrdinal = (n) => {
        const s = ["th","st","nd","rd"];
        const v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
      };
      
      document.querySelector('.day-display').textContent = dayName;
      document.querySelector('.date-display').textContent = `${getOrdinal(date)} of ${monthName}`;
    }
    
    updateDateDisplay();

    // Tab switcher
    function switchTab(tab) {
      const loginPanel = document.getElementById('loginPanel');
      const signupPanel = document.getElementById('signupPanel');
      const buttons = document.querySelectorAll('.tab-button');
      
      if (tab === 'login') {
        loginPanel.style.display = 'block';
        signupPanel.style.display = 'none';
        buttons[0].classList.add('active');
        buttons[1].classList.remove('active');
      } else {
        loginPanel.style.display = 'none';
        signupPanel.style.display = 'block';
        buttons[0].classList.remove('active');
        buttons[1].classList.add('active');
      }
    }

    // Role-based fields visibility toggler
    function toggleRoleFields() {
      const role = document.getElementById('signupRole').value;
      const employeeFields = document.getElementById('employeeFields');
      const driverFields = document.getElementById('driverFields');
      
      employeeFields.style.display = 'none';
      driverFields.style.display = 'none';
      
      document.getElementById('signupEmpId').required = false;
      document.getElementById('signupDept').required = false;
      document.getElementById('signupLicense').required = false;
      
      if (role === 'employee') {
        employeeFields.style.display = 'flex';
        document.getElementById('signupEmpId').required = true;
        document.getElementById('signupDept').required = true;
      } else if (role === 'driver') {
        driverFields.style.display = 'block';
        document.getElementById('signupLicense').required = true;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      toggleRoleFields();
    });
  </script>
</body>
</html>
