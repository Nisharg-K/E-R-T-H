<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E.R.T.H | Ride Groups</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <script defer src="../js/app.js?v=2.0"></script>
</head>
<body data-page="admin-ride">
  <div class="app-shell">
    <aside class="app-sidebar">
      <a class="brand" href="./admin.html"><span class="brand-mark">ERTH</span><span class="brand-copy"><strong> Admin</strong></span></a>
      <nav class="nav-list">
        <a class="nav-item" href="./admin.html">Overview</a>
        <a class="nav-item" href="./admin-approval.html">Approval</a>
        <a class="nav-item active" href="./admin-ride.html">Ride Groups</a>
        <a class="nav-item" href="./admin-people.html">People</a>
        <a class="nav-item" href="./admin-map.html">Employee Pickup Map</a>
        <a class="nav-item" href="./admin-ai.html">AI Query</a>
      </nav>
      <div class="sidebar-footer">
        <span id="sessionBadge" class="session-badge">Signed out</span>
        <button id="logoutButton" class="ghost-button" type="button">Sign out</button>
      </div>
    </aside>
    <main class="app-main">
      <header class="app-header">
        <div>
          <p class="eyebrow">Admin dashboard</p>
          <h1>Ride Groups</h1>
        </div>
        <div class="site-actions" style="display: flex; gap: 12px; align-items: center;">
          <div style="display: flex; align-items: center; gap: 6px;">
            <label for="routeFilterDate" style="margin: 0; font-size: 0.85rem; white-space: nowrap; color: var(--text);">Route Date:</label>
            <input type="date" id="routeFilterDate" style="width: auto; padding: 4px 8px; margin: 0; font-size: 0.85rem; height: auto;" />
            <span id="routeDateDisplay" style="font-size: 0.85rem; color: var(--muted); min-width: 120px;"></span>
          </div>
          <button id="refreshButton" class="primary-button" type="button">Refresh data</button>
        </div>
      </header>
      <section class="card"><div class="table-shell" id="ridesTable"></div><div id="ridesPagination"></div></section>
    </main>
  </div>
</body>
</html>
