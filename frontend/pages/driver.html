<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E.R.T.H | Driver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="../js/app.js"></script>
</head>
<body data-page="driver">
  <div class="app-shell">
    <aside class="app-sidebar">
      <a class="brand" href="./driver.html">
        <span class="brand-mark">ERTH</span>
        <span class="brand-copy">
          <strong>Driver</strong>
        </span>
      </a>
      <nav class="nav-list">
        <a class="nav-item active" href="/pages/driver.html">Assigned route</a>
      </nav>
      <div class="sidebar-footer">
        <span id="sessionBadge" class="session-badge">Signed out</span>
        <button id="logoutButton" class="ghost-button" type="button">Sign out</button>
      </div>
    </aside>

    <main class="app-main">
      <header class="app-header">
        <div>
          <p class="eyebrow">Driver dashboard</p>
          <h1>Today's pickups, status, and route tracking</h1>
        </div>
        <div class="site-actions">
          <button id="refreshButton" class="primary-button" type="button">Refresh data</button>
        </div>
      </header>

      <section class="metrics-row">
        <article class="metric-card"><span>Assigned rides</span><strong id="metricAssigned">0</strong></article>
        <article class="metric-card"><span>Active route</span><strong id="metricCurrentStatus">None</strong></article>
        <article class="metric-card"><span>Driver alerts</span><strong id="metricUnread">0</strong></article>
      </section>

      <section class="dashboard-grid">
        <section class="card span-2">
          <div class="section-heading"><div><p class="eyebrow">Route</p><h3>Live route map</h3></div></div>
          <div id="liveMap" class="map-surface"></div>
        </section>

        <section class="card">
          <div class="section-heading"><div><p class="eyebrow">Current trip</p><h3>Assigned route details</h3></div></div>
          <div id="currentRideCard" class="list-panel"></div>
        </section>

        <section class="card">
          <div class="section-heading"><div><p class="eyebrow">Notifications</p><h3>Driver alerts</h3></div></div>
          <div id="notificationsList" class="list-panel"></div>
        </section>

        <section class="card span-2">
          <div class="section-heading"><div><p class="eyebrow">Trips</p><h3>Assigned rides</h3></div></div>
          <div id="ridesTable" class="table-shell"></div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
