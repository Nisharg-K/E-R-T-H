<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E.R.T.H | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="../js/app.js"></script>
</head>
<body data-page="admin">
  <div class="app-shell">
    <aside class="app-sidebar">
      <a class="brand" href="./admin.html">
        <span class="brand-mark">ERTH</span>
        <span class="brand-copy"><strong>Admin</strong></span>
      </a>
      <nav class="nav-list">
        <a class="nav-item active" href="./admin.html">Overview</a>
        <a class="nav-item" href="./admin-approval.html">Approval</a>
        <a class="nav-item" href="./admin-ride.html">Ride Groups</a>
        <a class="nav-item" href="./admin-people.html">People</a>
        <a class="nav-item" href="./admin-map.html">Employee Map</a>
        <a class="nav-item" href="./admin-ai.html">AI Query</a>
      </nav>
      <div class="sidebar-footer">
        <span id="sessionBadge" class="session-badge">Signed out</span>
        <button id="logoutButton" class="ghost-button" type="button">Sign out</button>
      </div>
    </aside>

    <main class="app-main">
      <header class="app-header">
        <div class="app-header-brand">
          <span class="brand-mark">ERTH Admin</span>
        </div>
        <div class="top-right-actions">
          <span id="dashboardDate" style="font-size: 0.85rem; color: var(--muted);"></span>
          <button id="refreshButton" class="primary-button" type="button">Refresh data</button>
          <button id="notificationBell" class="ghost-button notification-bell floating-bell" type="button" aria-label="Notifications">
            <span class="bell-icon" aria-hidden="true"></span>
            <span class="notification-dot" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <section class="metrics-row">
        <article class="metric-card"><span>Total users</span><strong id="metricEmployees">0</strong></article>
        <article class="metric-card"><span>Total drivers</span><strong id="metricDrivers">0</strong></article>
        <article class="metric-card"><span>Active rides</span><strong id="metricActiveRides">0</strong></article>
        <article class="metric-card"><span>Delayed trips</span><strong id="metricDelay">0</strong></article>
      </section>

      <section class="dashboard-grid">
        <section class="card span-3 map-full">
          <div class="section-heading"><div><p class="eyebrow">Live tracking</p><h3>Active cab positions</h3></div></div>
          <div id="liveMap" class="map-surface"></div>
        </section>

        <section class="card span-3">
          <div class="section-heading"><div><p class="eyebrow">Availability exceptions</p><h3>Employee Unavailability Logs</h3></div></div>
          <div class="table-shell" id="unavailabilityTable"></div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
